name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # 1. 启动 Docker（如果没跑）
            sudo systemctl start docker 2>/dev/null || true

            # 2. 强制删除旧目录
            cd /opt
            sudo rm -rf qq-farm-automation

            # 3. 克隆（主代理 gh.con.sh，备用 ghproxy.com）
            git clone --depth 1 https://gh.con.sh/https://github.com/xue256964/qq-farm-automation.git 2>/dev/null || \
            git clone --depth 1 https://ghproxy.com/https://github.com/xue256964/qq-farm-automation.git 2>/dev/null || \
            git clone --depth 1 https://github.com/xue256964/qq-farm-automation.git

            cd qq-farm-automation

            # 4. 拉取基础镜像
            sudo docker pull node:20-alpine 2>/dev/null || \
            sudo docker pull docker.m.daocloud.io/library/node:20-alpine
            sudo docker tag node:20-alpine node:20-alpine-local 2>/dev/null || \
            sudo docker tag docker.m.daocloud.io/library/node:20-alpine node:20-alpine-local

            # 5. 修改 Dockerfile
            find . -name Dockerfile -exec sudo sed -i "s/FROM node:20-alpine.*/FROM node:20-alpine-local/" {} \;

            # 6. 构建并启动
            sudo docker compose down 2>/dev/null || true
            sudo docker compose up -d --build
