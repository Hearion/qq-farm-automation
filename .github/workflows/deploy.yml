name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /opt
            rm -rf qq-farm-automation
            git clone --depth 1 https://ghproxy.com/https://github.com/xue256964/qq-farm-automation.git
            cd qq-farm-automation
            docker pull node:20-alpine || docker pull docker.m.daocloud.io/library/node:20-alpine
            docker tag node:20-alpine node:20-alpine-local 2>/dev/null || docker tag docker.m.daocloud.io/library/node:20-alpine node:20-alpine-local
            find . -name Dockerfile -exec sed -i "s/FROM node:20-alpine.*/FROM node:20-alpine-local/" {} \;
            docker compose down 2>/dev/null || true
            docker compose up -d --build
