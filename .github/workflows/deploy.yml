name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            # 优化 Git 网络连接（避免 TLS 中断）
            export GIT_CURL_VERBOSE=1
            export GIT_TRACE=1
            export GIT_SSL_NO_VERIFY=0
            export GIT_HTTP_LOW_SPEED_LIMIT=1000
            export GIT_HTTP_LOW_SPEED_TIME=60

            APP_DIR="/opt/qq-farm-automation"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            mkdir -p "$APP_DIR"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone --depth 1 "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            # 拉取最新代码（增加重试和超时）
            for i in 1 2 3; do
              echo "第 $i 次尝试拉取代码..."
              git fetch --depth 1 origin main && break
              echo "拉取失败，等待 10 秒后重试..."
              sleep 10
            done

            git reset --hard origin/main

            # 拉取基础镜像（服务器已配置镜像加速器，直接拉取）
            sudo docker pull node:20-alpine
            sudo docker tag node:20-alpine node:20-alpine-local

            # 修改 Dockerfile 使用本地镜像
            find . -maxdepth 3 -name Dockerfile -not -path "*/node_modules/*" -exec sudo sed -i "s/FROM node:20-alpine.*/FROM node:20-alpine-local/" {} \;

            # 选择 Docker Compose 命令
            if command -v docker compose >/dev/null 2>&1; then
              COMPOSE="docker compose"
            else
              COMPOSE="docker-compose"
            fi

            # 清理并构建（禁用远程拉取）
            sudo $COMPOSE down 2>/dev/null || true
            sudo docker builder prune -a -f
            sudo DOCKER_BUILDKIT=1 $COMPOSE build --no-cache --pull=false
            sudo $COMPOSE up -d
            sudo $COMPOSE ps
